services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env            # GEMINI_API_KEY etc.; chmod 600, never in git
    volumes:
      - ./data:/app/data      # books, caches, SQLite — survives redeploys
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    command: ["python", "bot/bot.py"]
    volumes:
      - ./data:/app/data
    depends_on:
      - api
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
