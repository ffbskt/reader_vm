<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vocabulary practice</title>
<style>
:root{--bg:#faf9f6;--panel:#fff;--panel2:#f0eee8;--ink:#23282e;--muted:#6e6f66;
  --line:#ddd;--accent:#2d5fa8;--accent-ink:#fff;--ok:#2e9e5b;--unk:#a85b25}
@media(prefers-color-scheme:dark){:root{--bg:#15181d;--panel:#1d2127;
  --panel2:#242931;--ink:#e6e4dc;--muted:#9a9b90;--line:#333941;--accent:#6e9bd8;
  --accent-ink:#10131a;--ok:#4bbd7e;--unk:#d89a5e}}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--ink);margin:0;
  font:16px/1.5 system-ui,'Segoe UI',sans-serif}
.wrap{max-width:560px;margin:0 auto;padding:22px 18px 60px}
header{display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:4px}
h1{font-size:1.35rem;margin:0}
a.back{color:var(--accent);text-decoration:none;font-size:.9rem}
.stat{color:var(--muted);font-size:.9rem;margin:0 0 20px}
.stat b{color:var(--ink);font-variant-numeric:tabular-nums}
.sub{color:var(--muted);font-size:.9rem;margin:0 0 16px}
.cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cols button{padding:14px 10px;border:2px solid var(--line);border-radius:10px;
  background:var(--panel);font:inherit;cursor:pointer;color:var(--ink)}
.cols button.sel{border-color:var(--accent)}
.cols button.ok{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,transparent);
  color:var(--ok);pointer-events:none}
.cols button.bad{border-color:var(--unk);animation:shake .3s}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
#msg{margin-top:20px;text-align:center;font-size:1.05rem}
.big{border:none;background:var(--accent);color:var(--accent-ink);
  border-radius:8px;padding:11px 22px;font:inherit;font-weight:600;
  cursor:pointer;margin-top:16px}
.empty{color:var(--muted);text-align:center;margin-top:40px;line-height:1.6}
</style>
<div class="wrap">
  <header><h1>🎯 Vocabulary practice</h1>
    <a class="back" id="back" href="#">← back</a></header>
  <p class="stat" id="stat"></p>
  <p class="sub">Tap a word, then its meaning. Correct matches move the word
    into your <b>known</b> vocabulary.</p>
  <div class="cols"><div id="words"></div><div id="tr"></div></div>
  <div id="msg"></div>
</div>
<script>
const qs = new URLSearchParams(location.search);
const lang = qs.get('lang') || 'es';
const book = qs.get('book') || '';
const JWT = () => localStorage.getItem('jwt');
const H = () => JWT() ? {Authorization: 'Bearer ' + JWT()} : {};
const $ = id => document.getElementById(id);
const esc = s => (s + '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
  .replace(/"/g, '&quot;');
const LANGS = {en: 'English', es: 'Español', ru: 'Русский'};
$('back').onclick = e => { e.preventDefault(); history.length > 1
  ? history.back() : location.href = 'app.html'; };

let pick = null, matched = 0, total = 0;
async function stats(){
  const v = await fetch(`/vocab?lang=${lang}`, {headers: H()}).then(r => r.json());
  $('stat').innerHTML = `${LANGS[lang] || lang} — <b>${(v.counts.known||0)
    .toLocaleString()}</b> known · <b>${v.counts.learning||0}</b> learning`;
}
async function round(){
  matched = 0; pick = null; $('msg').textContent = '';
  const q = await fetch(
    `/vocab/quiz?lang=${lang}&book=${encodeURIComponent(book)}&n=5`,
    {headers: H()}).then(r => r.json());
  if (!q.pairs || !q.pairs.length){
    $('words').innerHTML = ''; $('tr').innerHTML = '';
    $('msg').innerHTML = `<div class="empty">${esc(q.reason
      || 'Nothing to review yet.')}<br>Tap words while reading to add them, `
      + `then come back here.</div>`;
    return;
  }
  total = q.pairs.length;
  const trOf = {}; q.pairs.forEach(p => trOf[p.word] = p.translation);
  $('words').innerHTML = q.pairs.map(p =>
    `<button data-w="${esc(p.word)}">${esc(p.word)}</button>`).join('');
  $('tr').innerHTML = q.shuffled.map(t =>
    `<button data-tr="${esc(t)}">${esc(t)}</button>`).join('');
  const words = [...document.querySelectorAll('#words button')];
  const trs = [...document.querySelectorAll('#tr button')];
  words.forEach(w => w.onclick = () => {
    words.forEach(x => x.classList.remove('sel')); w.classList.add('sel');
    pick = w; });
  trs.forEach(tb => tb.onclick = () => {
    if (!pick) return;
    if (tb.dataset.tr === trOf[pick.dataset.w]){
      pick.classList.add('ok'); tb.classList.add('ok');
      const word = pick.dataset.w; pick = null; matched++;
      fetch('/vocab/promote', {method: 'POST',
        headers: {...H(), 'Content-Type': 'application/json'},
        body: JSON.stringify({lang, words: [word]})});
      if (matched === total){
        stats();
        $('msg').innerHTML = `✓ ${total} words learned!`
          + `<br><button class="big" id="again">Another round</button>`;
        $('again').onclick = round;
      }
    } else {
      tb.classList.add('bad'); setTimeout(() => tb.classList.remove('bad'), 300);
    }
  });
}
stats(); round();
</script>
