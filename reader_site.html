<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reader</title>
<style>
:root{
  --bg:#F6F5F0; --panel:#FFFFFF; --panel2:#EFEDE6; --ink:#23282E; --muted:#6E6F66;
  --line:#DDDBD0; --accent:#2D5FA8; --accent-ink:#FFFFFF; --unk:#A85B25;
  --unk-bg:#F5E8DC;
}
@media (prefers-color-scheme: dark){:root{
  --bg:#15181D; --panel:#1D2127; --panel2:#242931; --ink:#E6E4DC; --muted:#9A9B90;
  --line:#333941; --accent:#6E9BD8; --accent-ink:#10131A; --unk:#D89A5E;
  --unk-bg:#33271B;
}}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--ink);margin:0;
  font:17px/1.65 'Iowan Old Style',Palatino,Georgia,serif}
.wrap{max-width:760px;margin:0 auto;padding:20px 18px 90px}
header{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap;
  font-family:system-ui,'Segoe UI',sans-serif;margin-bottom:14px}
header h1{font-size:1.15rem;margin:0}
header .lv{background:var(--panel2);border-radius:10px;font-size:.75rem;
  padding:2px 10px;color:var(--muted);border:1px solid var(--line);
  font-family:inherit;cursor:pointer}
.empty a{color:var(--accent)}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--panel);
  border-top:1px solid var(--line);padding:8px;display:flex;gap:10px;
  justify-content:center;align-items:center;font-family:system-ui,sans-serif}
nav button{border:1px solid var(--accent);background:var(--accent);
  color:var(--accent-ink);font:inherit;border-radius:6px;padding:6px 18px;cursor:pointer}
nav button:disabled{opacity:.4;cursor:default}
nav select{font:inherit;padding:5px;border:1px solid var(--line);border-radius:6px;
  background:var(--panel);color:var(--ink)}
.pg{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:22px 26px;margin-bottom:14px}
.pg .phead{font-family:system-ui,sans-serif;font-size:.78rem;color:var(--muted);
  margin-bottom:12px}
.line{margin:0 0 10px}
.line b.sp{font-family:system-ui,sans-serif;font-size:.85em;letter-spacing:.03em}
.w{cursor:pointer;border-radius:3px}
.w.unk{background:var(--unk-bg);color:var(--unk)}
.w.learning{border-bottom:2px solid var(--accent);color:var(--ink)}
.w:hover{outline:2px solid var(--accent)}
#tip{position:fixed;background:var(--ink);color:var(--bg);border-radius:6px;
  padding:6px 12px;font:14px/1.4 system-ui,sans-serif;pointer-events:none;
  display:none;max-width:280px;z-index:9}
.vocab{border-top:1px dashed var(--line);margin-top:14px;padding-top:10px;
  font-family:system-ui,sans-serif;font-size:.85rem;columns:2;column-gap:26px}
@media (max-width:600px){.vocab{columns:1}}
.vocab div{break-inside:avoid;color:var(--muted)}
.vocab b{color:var(--ink)}
.vocab .rep b{color:var(--muted);text-decoration:underline}
.empty{font-family:system-ui,sans-serif;color:var(--muted);text-align:center;
  margin-top:60px}
</style>
<div class="wrap">
  <header><h1 id="title">…</h1>
    <select class="lv" id="lv" title="level — pages translated"></select>
    <button id="reviewBtn" class="lv" style="cursor:pointer" hidden></button>
  </header>
  <div id="view"></div>
</div>
<nav>
  <button id="prev">‹ prev</button>
  <select id="pageSel"></select>
  <button id="next">next ›</button>
</nav>
<div id="tip"></div>

<script>
const qs = new URLSearchParams(location.search);
const FOLD = {'á':'a','é':'e','í':'i','ó':'o','ú':'u','ñ':'n','ü':'u','ё':'е'};
const fold = w => w.toLowerCase().replace(/[áéíóúñüё]/g, c => FOLD[c]);
// Latin (with accents) OR Cyrillic word
const WORD_RX = /[A-Za-zÀ-ÖØ-öø-ÿА-Яа-яЁё]+/g;
const trText = tr => tr ? Object.values(tr).map(esc).join(' · ') : '';
let data = null, cur = 0;

const CLITICS = ['selos','selas','selo','sela','melo','mela','telo','tela',
  'nos','les','los','las','se','me','te','le','lo','la'];
const VERB_ENDS = ('ariamos eriamos iriamos asteis isteis aramos ieramos ' +
  'abamos iamos ieron ieran ierais iendo ando aria eria iria arias erias ' +
  'irias arian erian irian ados adas idos idas ado ada ido ida aban abas ' +
  'aba aran aras ara aren areis are eran eras era ere iran iras ira ire ' +
  'aron aste iste asen ase iesen iese emos imos amos ais eis an en es as ' +
  'os a e o i n s').split(' ').sort((a, b) => b.length - a.length);
function lookup(dict, w){
  const rec = (k, depth) => {
    if (dict[k]) return dict[k];
    if (depth >= 3 || k.length < 4) return null;
    for (const cl of CLITICS)
      if (k.endsWith(cl) && k.length - cl.length >= 3){
        const r = rec(k.slice(0, -cl.length), depth + 1);
        if (r) return r;
      }
    for (const end of VERB_ENDS){
      const stem = k.slice(0, -end.length);
      if (k.endsWith(end) && stem.length >= 3){
        const variants = [stem];
        if (stem.includes('ie')) variants.push(stem.replace(/ie/g, 'e'));
        if (stem.includes('ue')) variants.push(stem.replace(/ue/g, 'o'));
        for (const st of variants){
          if (dict[st]) return dict[st];
          for (const inf of ['ar','er','ir'])
            if (dict[st + inf]) return dict[st + inf];
        }
      }
    }
    return null;
  };
  return rec(fold(w), 0);
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
// personal vocabulary (2g): the user's own known/learning words drive marking
const myVocab = {lang: '', known: new Set(), learning: new Set()};
function wrapWords(text, unkSet, dict){
  return esc(text).replace(WORD_RX, w => {
    const k = fold(w);
    const tr = lookup(dict, w);
    if (myVocab.known.has(k))                       // mastered: plain
      return w;
    const learning = myVocab.learning.has(k);
    const isUnk = learning || unkSet.has(k) || !!tr;
    if (!isUnk) return w;
    const cls = learning ? 'w learning' : 'w unk';
    return `<span class="${cls}" data-w="${k}" data-t="${trText(tr)}">${w}</span>`;
  });
}
function render(){
  const p = data.pages[cur], dict = data.dictionary;
  const unk = new Set();
  p.sentences.forEach(s => (s.unknown_after || []).forEach(w => unk.add(fold(w))));
  // group consecutive sentences by speaker, like the PDF
  const groups = [];
  p.sentences.forEach(s => {
    const sp = (s.speaker || '').trim().toUpperCase().replace(/\.$/, '');
    const txt = (s.simple || '').trim();
    if (!txt) return;
    if (groups.length && groups[groups.length - 1].sp === sp)
      groups[groups.length - 1].parts.push(txt);
    else groups.push({sp, parts: [txt]});
  });
  // per-page vocabulary: alphabetical, words in this page's text
  const seenBefore = new Set();
  for (let i = 0; i < cur; i++)
    data.pages[i].sentences.forEach(s =>
      (s.unknown_after || []).forEach(w => seenBefore.add(fold(w))));
  const vocab = [...unk].sort().map(k => {
    const tr = lookup(dict, k);
    return tr ? {w: k, tr, rep: seenBefore.has(k)} : null;
  }).filter(Boolean);

  document.getElementById('view').innerHTML = `<div class="pg">
    <div class="phead">page ${p.page} · coverage ${p.coverage_before}% →
      ${p.coverage_after}% · level ${data.level}</div>
    ${groups.map(g => `<p class="line">${g.sp ?
        `<b class="sp">${g.sp}.</b> — ` : ''}${wrapWords(g.parts.join(' '), unk, dict)}</p>`).join('')}
    ${vocab.length ? `<div class="vocab">${vocab.map(v =>
      `<div class="${v.rep ? 'rep' : ''}"><b>${v.w}</b> – ${trText(v.tr)}</div>`).join('')}</div>` : ''}
  </div>`;
  document.getElementById('pageSel').value = cur;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === data.pages.length - 1;
  attachTips();
}
const tip = document.getElementById('tip');
function attachTips(){
  document.querySelectorAll('.w').forEach(el => {
    el.onmouseenter = e => {
      if (!el.dataset.t) return;
      tip.textContent = el.dataset.t; tip.style.display = 'block';
      const r = el.getBoundingClientRect();
      tip.style.left = Math.min(r.left, innerWidth - 290) + 'px';
      tip.style.top = (r.bottom + 6) + 'px';
    };
    el.onmouseleave = () => tip.style.display = 'none';
    // tap-to-learn: click an unknown word -> add it to my vocabulary
    el.onclick = () => {
      const k = el.dataset.w;
      if (!k || myVocab.known.has(k)) return;
      myVocab.learning.add(k);
      document.querySelectorAll(`.w[data-w="${k}"]`)
        .forEach(x => x.className = 'w learning');
      updateReviewBtn();
      fetch('/vocab', {method: 'POST', headers: {...authHeaders(),
        'Content-Type': 'application/json'},
        body: JSON.stringify({lang: myVocab.lang, words: [k]})});
    };
  });
}
// ---- review game (2g.4): opens in a SEPARATE window (vocab.html) ----
function updateReviewBtn(){
  const btn = document.getElementById('reviewBtn');
  const n = myVocab.learning.size;
  btn.hidden = n === 0;
  btn.textContent = `🎯 review (${n})`;
}
document.getElementById('reviewBtn').onclick = () =>
  window.open(`vocab.html?lang=${myVocab.lang}&book=${qs.get('book')}`,
              '_blank');

document.getElementById('prev').onclick = () => { cur--; render(); scrollTo(0,0); };
document.getElementById('next').onclick = () => { cur++; render(); scrollTo(0,0); };
document.getElementById('pageSel').onchange = e => { cur = +e.target.value; render(); };

const authHeaders = () => localStorage.getItem('jwt') ?
  {Authorization: 'Bearer ' + localStorage.getItem('jwt')} : {};
(async () => {
  const book = qs.get('book');
  const level = qs.get('level') || 0;
  const base = qs.get('baseline') ? 1 : 0;
  const langs = qs.get('langs') || 'en,ru';
  const bq = (base ? '&baseline=1' : '') + '&langs=' + langs;
  // level switcher: every level of THIS book with its translated-page count,
  // so a level mix-up is visible instead of looking like lost pages
  const bl = await fetch('/books', {headers: authHeaders()})
    .then(r => r.json());
  const b = (bl.books || []).find(x => x.slug === book);
  const dp = (b && (base ? b.done_base : b.done_pages)) || {};
  document.getElementById('lv').innerHTML = [0, 25, 50, 75].map(l =>
    `<option value="${l}" ${+level === l ? 'selected' : ''}>
     level ${l}${base ? ' (generic)' : ''} · ${dp[l] || 0} p.</option>`).join('');
  document.getElementById('lv').onchange = e =>
    location.href = `reader_site.html?book=${book}&level=${e.target.value}${bq}`;

  // personal vocabulary for THIS book's language drives word marking
  myVocab.lang = (b && b.lang) || 'es';
  try {
    const v = await fetch(`/vocab?lang=${myVocab.lang}`, {headers: authHeaders()})
      .then(r => r.json());
    myVocab.known = new Set(v.known || []);
    myVocab.learning = new Set(v.learning || []);
  } catch (e) {}
  updateReviewBtn();

  const r = await fetch(`/books/${book}/reader?level=${level}${bq}`,
                        {headers: authHeaders()});
  data = await r.json();
  document.getElementById('title').textContent = data.title || 'Reader';
  if (!data.pages || !data.pages.length){
    const other = [0, 25, 50, 75].filter(l => dp[l]);
    document.getElementById('view').innerHTML =
      `<div class="empty">No translated pages at level ${level} yet.` +
      (other.length ? ` This book has pages at: ${other.map(l =>
        `<a href="reader_site.html?book=${book}&level=${l}${bq}">level ${l}
         (${dp[l]} p.)</a>`).join(', ')}.` :
       ' Run step 4 in the builder.') + '</div>';
    return;
  }
  document.getElementById('pageSel').innerHTML = data.pages.map((p, i) =>
    `<option value="${i}">page ${p.page}</option>`).join('');
  render();
})();
</script>
